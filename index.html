<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1916">
<title>Gestione Turni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBT0JsxTe0xL_mEVk-tXA_QcMKlPktu7FE",
  authDomain: "turni-kozmolaze.firebaseapp.com",
  projectId: "turni-kozmolaze",
  storageBucket: "turni-kozmolaze.firebasestorage.app",
  messagingSenderId: "145329320632",
  appId: "1:145329320632:web:c152f3c491823f5fc47a4d",
  measurementId: "G-BDCV7E84GC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db = db;
window._fbFns = { collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, setDoc, serverTimestamp };
window._firebaseReady = true;
window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root{--bg:#f7f5f0;--surface:#fff;--border:#e2ddd5;--text:#1a1916;--text2:#6b6660;--text3:#a09890;--accent:#c17f24;--accent-light:#fdf3e3;
  --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--safe-left:env(safe-area-inset-left);--safe-right:env(safe-area-inset-right);}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  padding-left:var(--safe-left);padding-right:var(--safe-right);}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:#1a1916;display:flex;align-items:center;justify-content:center;z-index:200;padding:calc(1rem + var(--safe-top)) 1rem calc(1rem + var(--safe-bottom));overflow-y:auto;}
#login-screen.hidden{display:none;}
.login-box{background:#fff;border-radius:16px;padding:1.75rem 2rem;width:100%;max-width:320px;text-align:center;}
.login-box h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:#1a1916;margin-bottom:.25rem;}
.login-box .sub{font-size:.78rem;color:var(--text3);margin-bottom:1.4rem;}
.worker-select{width:100%;padding:10px 12px;font-family:'Inter',sans-serif;font-size:1rem;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);margin-bottom:1rem;outline:none;-webkit-appearance:auto;}
.btn-login{width:100%;padding:.8rem;background:#1a1916;color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:500;cursor:pointer;}
.login-error{font-size:.78rem;color:#a32d2d;margin-top:.6rem;min-height:1rem;}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.npbtn{padding:.8rem;border:1px solid var(--border);background:var(--bg);border-radius:10px;font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:500;cursor:pointer;color:var(--text);-webkit-tap-highlight-color:transparent;}
.npbtn:active{background:#e0dbd2;}
.npbtn.del{font-size:.9rem;color:var(--text2);}
.pin-row{display:flex;gap:12px;justify-content:center;margin-bottom:1rem;}
.pin-dot{width:48px;height:52px;border:1.5px solid var(--border);border-radius:10px;font-size:1.6rem;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.btn-cancel{padding:8px 16px;border:1px solid var(--border);background:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;cursor:pointer;color:var(--text2);}

/* ── HEADER ── */
header{background:#1a1916;color:#f7f5f0;padding:calc(.9rem + var(--safe-top)) 1.25rem .9rem;display:flex;align-items:center;gap:.75rem;}
header h1{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:600;white-space:nowrap;}
header .sub{font-size:.7rem;color:#a09890;}
header .clock{margin-left:auto;font-size:.8rem;color:#a09890;white-space:nowrap;}
.user-badge{display:flex;align-items:center;gap:6px;margin-left:.75rem;}
.badge{font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge.admin{background:var(--accent);color:#fff;}
.badge.worker{background:#3c3489;color:#eeedfe;}
.btn-logout{font-size:.68rem;padding:3px 9px;border:1px solid rgba(255,255,255,.25);border-radius:20px;background:none;color:#a09890;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;-webkit-tap-highlight-color:transparent;}

/* ── NAV ── */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;}
nav button{padding:.75rem 1.1rem;border:none;background:none;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;-webkit-tap-highlight-color:transparent;}
nav button.active{color:var(--accent);border-bottom-color:var(--accent);}

.container{padding:1rem;}

/* ── WEEK HEADER ── */
.week-header{font-family:'Playfair Display',serif;font-size:1rem;margin:1.1rem 0 .5rem;border-left:3px solid var(--accent);padding-left:.65rem;}
.edit-hint{font-size:.7rem;color:var(--text3);margin-bottom:.5rem;}

/* ── DESKTOP TABLE ── */
.schedule-wrap{overflow-x:auto;margin-bottom:1.5rem;-webkit-overflow-scrolling:touch;}
table.schedule{border-collapse:collapse;font-size:.73rem;min-width:700px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
table.schedule th{background:#1a1916;color:#f7f5f0;padding:.4rem .45rem;text-align:center;font-weight:500;font-size:.68rem;white-space:nowrap;}
table.schedule th .dname{font-size:.74rem;}
table.schedule th .ddate{font-size:.63rem;color:#a09890;}
table.schedule td{padding:.25rem .3rem;border:.5px solid var(--border);text-align:center;vertical-align:middle;min-width:68px;transition:background .12s;}
table.schedule td .cell-names{display:flex;flex-direction:column;align-items:center;gap:2px;}
table.schedule td.editable{cursor:pointer;}
table.schedule td.editable:hover{background:#f0ece4;}
table.schedule td.hour{background:#f7f5f0;font-weight:500;color:var(--text2);font-size:.68rem;min-width:40px;cursor:default;position:sticky;left:0;z-index:2;}
table.schedule td.hour:hover{background:#f7f5f0;}
table.schedule th:first-child{position:sticky;left:0;z-index:3;}
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.64rem;font-weight:600;margin:1px;}
.chip.ruf{background:#e53935;color:#fff;}
.chip.andre{background:#1e88e5;color:#fff;}
.chip.ale{background:#43a047;color:#fff;}
.chip.fede{background:#fb8c00;color:#fff;}
.chip.sofi{background:#8e24aa;color:#fff;}
.chip.matteo{background:#00897b;color:#fff;}
.chip.sam{background:#d81b60;color:#fff;}
.chip.diego{background:#f9a825;color:#1a1916;}
.chip.brand{background:#ecebe8;color:#6b6660;font-style:italic;font-size:.6rem;border:1px solid #ddd;}

/* ── MOBILE DAY VIEW ── */
.day-nav{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;}
.day-nav-btn{width:38px;height:38px;border:1px solid var(--border);background:var(--surface);border-radius:8px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.day-nav-btn:active{background:var(--bg);}
.day-nav-title{flex:1;text-align:center;}
.day-nav-title .dname{font-weight:600;font-size:.95rem;}
.day-nav-title .ddate{font-size:.72rem;color:var(--text2);}
.day-nav-dots{display:flex;gap:4px;justify-content:center;margin-bottom:.75rem;}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .15s;}
.day-dot.active{background:var(--accent);}
.day-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.day-table th{background:#1a1916;color:#f7f5f0;padding:.45rem .6rem;font-size:.72rem;font-weight:500;}
.day-table th:first-child{width:52px;}
.day-table td{padding:.4rem .5rem;border:.5px solid var(--border);vertical-align:middle;}
.day-table td.hour{font-size:.7rem;font-weight:500;color:var(--text2);background:#f7f5f0;width:52px;white-space:nowrap;}
.day-table td.names{text-align:left;}
.day-table td.names .cell-names{display:flex;flex-direction:row;flex-wrap:wrap;gap:3px;align-items:center;}
.day-table td.names .chip{font-size:.7rem;padding:3px 8px;}
.day-table td.editable{cursor:pointer;}
.day-table td.editable:active{background:#f0ece4;}
.week-tabs{display:flex;gap:0;margin-bottom:.85rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.week-tab{flex:1;padding:.55rem;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.week-tab.active{background:#1a1916;color:#fff;}

/* ── POPUP (cell editor) ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center;}
#overlay.show{display:flex;}
#popup{background:var(--surface);border-radius:16px 16px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:500px;}
#popup h3{font-size:.9rem;font-weight:600;margin-bottom:.85rem;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem;min-height:32px;}
.tag-item{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 12px;border-radius:20px;font-size:.78rem;font-weight:500;border:1px solid var(--border);}
.tag-item button{background:none;border:none;cursor:pointer;font-size:1rem;line-height:1;color:inherit;opacity:.6;padding:0;}
.add-row{display:flex;gap:8px;margin-bottom:.75rem;}
.add-row input{flex:1;font-family:'Inter',sans-serif;font-size:.88rem;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;}
.add-row input:focus{border-color:var(--accent);}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.85rem;}
.qbtn{font-size:.72rem;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}
.popup-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-save{padding:8px 20px;background:#1a1916;color:#f7f5f0;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;}

/* ── MONTH PICKER ── */
#month-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;justify-content:center;}
#month-overlay.show{display:flex;}
#month-popup{background:var(--surface);border-radius:16px 16px 0 0;padding:1.25rem 1.25rem 2rem;width:100%;max-width:400px;}
#month-popup h3{font-size:.9rem;font-weight:600;margin-bottom:1rem;}
.month-row{display:flex;gap:10px;margin-bottom:.75rem;align-items:center;}
.month-row label{font-size:.8rem;color:var(--text2);width:48px;flex-shrink:0;}
.month-row select{flex:1;font-family:'Inter',sans-serif;font-size:.9rem;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:auto;}
.month-row select:focus{border-color:var(--accent);}
.month-preview{font-size:.74rem;color:var(--text2);background:var(--bg);border-radius:8px;padding:.65rem .8rem;margin-bottom:.75rem;line-height:1.9;}
.month-warn{font-size:.72rem;color:#c17f24;background:var(--accent-light);border-radius:6px;padding:.4rem .6rem;margin-bottom:.75rem;}
.month-actions{display:flex;gap:8px;justify-content:flex-end;}

/* ── TASKS ── */
.workers-grid{display:grid;grid-template-columns:1fr;gap:1rem;}
@media(min-width:640px){.workers-grid{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}}
.worker-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.worker-card-header{padding:.85rem 1.1rem .65rem;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.9rem;flex-shrink:0;}
.worker-name{font-weight:600;font-size:.92rem;}
.worker-shifts{font-size:.72rem;color:var(--text2);}
.worker-body{padding:.85rem 1.1rem;}
.task-form{display:flex;gap:7px;margin-bottom:.7rem;flex-wrap:wrap;}
.task-form select,.task-form input{font-family:'Inter',sans-serif;font-size:.82rem;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;}
.task-form select{min-width:110px;}
.task-form input{flex:1;min-width:110px;}
.task-form input:focus,.task-form select:focus{border-color:var(--accent);}
.btn-add{padding:7px 14px;background:#1a1916;color:#f7f5f0;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.task-list{list-style:none;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border-radius:8px;border:.5px solid var(--border);}
.task-item.done{opacity:.5;}
.task-item.done .task-text{text-decoration:line-through;}
.task-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.task-text{font-size:.82rem;flex:1;}
.task-day-badge{font-size:.68rem;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--accent-light);color:var(--accent);white-space:nowrap;}
.btn-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem;padding:0 2px;line-height:1;-webkit-tap-highlight-color:transparent;}
.empty-tasks{font-size:.78rem;color:var(--text3);text-align:center;padding:.9rem 0;}
.card-locked{opacity:.4;pointer-events:none;}

/* ── RESPONSIVE SHOW/HIDE ── */
.mobile-only{display:none;}
.desktop-only{display:block;}
@media(max-width:700px){
  .mobile-only{display:block;}
  .desktop-only{display:none;}
  header h1{font-size:1.05rem;}
  header .sub{display:none;}
  .container{padding:.65rem;}
  nav button{padding:.85rem 1rem;font-size:.9rem;}
  .week-tab{padding:.65rem;font-size:.82rem;}
  .day-nav-btn{width:44px;height:44px;font-size:1.3rem;}
  .day-nav-title .dname{font-size:1.05rem;}
  .chip{font-size:.72rem;padding:3px 8px;}
  .day-table td{padding:.5rem .5rem;}
  .day-table td.hour{font-size:.75rem;}
  .day-table td.names .chip{font-size:.75rem;padding:4px 9px;}
  .task-item{padding:10px 12px;}
  .task-item input[type=checkbox]{width:22px;height:22px;}
  .task-text{font-size:.88rem;}
  .btn-del{font-size:1.3rem;padding:0 4px;}
  .worker-card-header{padding:1rem 1.1rem .8rem;}
  .avatar{width:44px;height:44px;font-size:1rem;}
  .worker-name{font-size:1rem;}
  .worker-shifts{font-size:.75rem;}
  .task-form{flex-direction:column;}
  .task-form select,.task-form input{font-size:.9rem;padding:9px 12px;width:100%;}
  .btn-add{width:100%;padding:10px;font-size:.9rem;}
  .container{padding-bottom:calc(.65rem + var(--safe-bottom));}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>Gestione Turni</h2>
    <p class="sub" id="login-sub">Chi sei?</p>
    <div id="step-name">
      <select class="worker-select" id="worker-select" onchange="document.getElementById('login-error').textContent=''">
        <option value="">— Seleziona il tuo nome —</option>
        <option>RUF</option><option>ANDRE</option><option>ALE</option><option>FEDE</option>
        <option>SOFI</option><option>MATTEO</option><option>SAM</option><option>DIEGO</option>
      </select>
      <button class="btn-login" onclick="proceedFromName()">Entra →</button>
    </div>
    <div id="step-pin" style="display:none">
      <p style="font-size:.75rem;color:var(--text3);margin-bottom:.75rem;" id="pin-label">Inserisci il PIN</p>
      <div class="numpad">
        <button class="npbtn" onclick="numTap('1')">1</button><button class="npbtn" onclick="numTap('2')">2</button><button class="npbtn" onclick="numTap('3')">3</button>
        <button class="npbtn" onclick="numTap('4')">4</button><button class="npbtn" onclick="numTap('5')">5</button><button class="npbtn" onclick="numTap('6')">6</button>
        <button class="npbtn" onclick="numTap('7')">7</button><button class="npbtn" onclick="numTap('8')">8</button><button class="npbtn" onclick="numTap('9')">9</button>
        <button class="npbtn del" onclick="numTap('del')">⌫</button><button class="npbtn" onclick="numTap('0')">0</button>
        <button class="npbtn" onclick="numTap('ok')" style="background:#1a1916;color:#fff;border-color:#1a1916;">OK</button>
      </div>
      <div class="pin-row" id="pin-display">
        <div class="pin-dot" id="pd0">·</div><div class="pin-dot" id="pd1">·</div>
        <div class="pin-dot" id="pd2">·</div><div class="pin-dot" id="pd3">·</div>
      </div>
      <button class="btn-cancel" style="width:100%;margin-top:.25rem;" onclick="backToName()">← Indietro</button>
    </div>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<header>
  <div><h1>Gestione Turni</h1><div class="sub" id="header-period">—</div></div>
  <div class="user-badge">
    <span class="badge" id="user-badge">—</span>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>
  <span class="clock" id="clock"></span>
</header>
<nav>
  <button class="active" onclick="showTab('orario',this)">📅 Orario</button>
  <button onclick="showTab('task',this)">✅ Task</button>
  <button id="btn-month" onclick="openMonthPicker()" style="display:none">📆 Mese</button>
</nav>

<!-- CELL EDITOR -->
<div id="overlay" onclick="closePopup(event)">
  <div id="popup">
    <h3 id="popup-title">Modifica cella</h3>
    <div class="tag-list" id="tag-list"></div>
    <div class="add-row">
      <input id="new-name" placeholder="Aggiungi nome…" list="name-suggestions" onkeydown="if(event.key==='Enter')addTagFromInput()">
      <datalist id="name-suggestions"></datalist>
    </div>
    <div class="quick-btns" id="quick-btns"></div>
    <div class="popup-actions">
      <button class="btn-cancel" onclick="closePopup()">Annulla</button>
      <button class="btn-save" onclick="saveCell()">Salva</button>
    </div>
  </div>
</div>

<!-- MONTH PICKER -->
<div id="month-overlay" onclick="closeMonthPicker(event)">
  <div id="month-popup">
    <h3>📆 Cambia mese</h3>
    <div class="month-row">
      <label>Mese</label>
      <select id="pick-month" onchange="updateMonthPreview()">
        <option value="0">Gennaio</option><option value="1">Febbraio</option>
        <option value="2">Marzo</option><option value="3">Aprile</option>
        <option value="4">Maggio</option><option value="5">Giugno</option>
        <option value="6">Luglio</option><option value="7">Agosto</option>
        <option value="8">Settembre</option><option value="9">Ottobre</option>
        <option value="10">Novembre</option><option value="11">Dicembre</option>
      </select>
    </div>
    <div class="month-row">
      <label>Anno</label>
      <select id="pick-year" onchange="updateMonthPreview()"></select>
    </div>
    <div class="month-preview" id="month-preview"></div>
    <div class="month-warn">⚠️ Cambiare mese azzera l'orario delle due settimane.</div>
    <div class="month-actions">
      <button class="btn-cancel" onclick="closeMonthPicker()">Annulla</button>
      <button class="btn-save" onclick="applyMonth()">Applica</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="tab-orario">
    <div class="mobile-only" id="mobile-schedule"></div>
    <div class="desktop-only" id="desktop-schedule"></div>
  </div>
  <div id="tab-task" style="display:none;"><div class="workers-grid" id="workers-root"></div></div>
</div>

<script>
// ── AUTH ─────────────────────────────────────────────────────
const ADMIN_USERS=['ANDRE','ALE'];
const ADMIN_PIN='6789';
let currentRole=null,currentWorker=null,pinBuffer='';

function proceedFromName(){
  const sel=document.getElementById('worker-select').value;
  const err=document.getElementById('login-error');
  if(!sel){err.textContent='Seleziona il tuo nome.';return;}
  if(ADMIN_USERS.includes(sel)){
    pinBuffer='';updatePinDisplay();
    document.getElementById('pin-label').textContent=`PIN per ${sel}`;
    document.getElementById('step-name').style.display='none';
    document.getElementById('step-pin').style.display='block';
    err.textContent='';
  } else {
    enterApp('worker',sel);
  }
}
function backToName(){
  pinBuffer='';updatePinDisplay();
  document.getElementById('step-pin').style.display='none';
  document.getElementById('step-name').style.display='block';
  document.getElementById('login-error').textContent='';
}
function numTap(v){

function buildWeeks(month,year){
  // Prima settimana: primo lunedì del mese
  const firstDay=new Date(year,month,1);
  // Trova il primo lunedì (getDay: 0=dom,1=lun,...,6=sab)
  let d=firstDay.getDay(); // 0=dom
  let offset=d===0?1:(d===1?0:8-d); // giorni fino al prossimo lunedì
  const w1start=new Date(year,month,1+offset);
  // Seconda settimana: 7 giorni dopo
  const w2start=new Date(w1start);
  w2start.setDate(w2start.getDate()+7);

  function makeWeek(start){
    return DAY_LABELS.map((label,i)=>{
      const d=new Date(start);
      d.setDate(d.getDate()+i);
      const day=String(d.getDate()).padStart(2,'0');
      const mon=String(d.getMonth()+1).padStart(2,'0');
      return{date:`${day}/${mon}`,label,fullDate:d};
    });
  }
  WEEK_DAYS=makeWeek(w1start);
  WEEK2_DAYS=makeWeek(w2start);
  ALL_DAYS=[...WEEK_DAYS,...WEEK2_DAYS];
}

function emptySchedule(){
  return Array.from({length:10},()=>Array.from({length:7},()=>[]));
}

function buildDesktopTable(weekDays,weekData,weekIdx){
  const isAdmin=currentRole==='admin';
  const w1s=weekDays[0].date;const w1e=weekDays[6].date;
  let html=`<div class="week-header">Settimana ${w1s} – ${w1e}</div>`;

  weekDays.forEach(d=>{html+=`<th><div class="dname">${d.label}</div><div class="ddate">${d.date}</div></th>`;});
  html+=`</tr></thead><tbody>`;
  HOURS.forEach((h,hi)=>{
    html+=`<tr><td class="hour">${h}</td>`;
    weekDays.forEach((_,di)=>{
      const names=weekData[hi][di];
      const content=(names&&names.length)?`<div class="cell-names">${names.map(n=>chipHTML(n)).join('')}</div>`:'';
      if(isAdmin)html+=`<td class="editable" onclick="openCell('${weekIdx}-${hi}-${di}')">${content}</td>`;
      else html+=`<td>${content}</td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function openToday(){
  const today=new Date();
  if(today.getMonth()!==currentMonth||today.getFullYear()!==currentYear)return;
  const d=today.getDate();
  const w1start=WEEK_DAYS[0].fullDate;
  const w2start=WEEK2_DAYS[0].fullDate;
  const w1startD=w1start instanceof Date?w1start:new Date(currentYear,currentMonth,parseInt(WEEK_DAYS[0].date));
  const diff1=Math.floor((today-w1startD)/(86400000));
  if(diff1>=0&&diff1<7){mobileWeekIdx=0;mobileDayIdx=diff1;return;}
  const w2startD=w2start instanceof Date?w2start:new Date(currentYear,currentMonth,parseInt(WEEK2_DAYS[0].date));
  const diff2=Math.floor((today-w2startD)/(86400000));
  if(diff2>=0&&diff2<7){mobileWeekIdx=1;mobileDayIdx=diff2;}
}

let tasks={};
let _unsubscribe=null;

function startTaskSync(){
  if(_unsubscribe)_unsubscribe();
  const {collection,onSnapshot}=window._fbFns;
  const db=window._db;
  _unsubscribe=onSnapshot(collection(db,'tasks'),(snapshot)=>{
    tasks={};
    snapshot.forEach(docSnap=>{
      const d=docSnap.data();
      if(!tasks[d.worker])tasks[d.worker]=[];
      tasks[d.worker].push({id:docSnap.id,day:d.day,text:d.text,done:d.done});
    });
    renderWorkersGrid();
  });
}

async function addTask(w,day,text){
  const {collection,addDoc,serverTimestamp}=window._fbFns;
  await addDoc(collection(window._db,'tasks'),{worker:w,day,text,done:false,createdAt:serverTimestamp()});
}

async function toggleTask(w,id){
  const t=tasks[w]?.find(t=>t.id===id);
  if(!t)return;
  const {doc,updateDoc}=window._fbFns;
  await updateDoc(doc(window._db,'tasks',id),{done:!t.done});
}

async function deleteTask(w,id){
  const {doc,deleteDoc}=window._fbFns;
  await deleteDoc(doc(window._db,'tasks',id));
}

function getWorkerDays(wk){
  const days=[];const wu=wk.toUpperCase();
  [{days:WEEK_DAYS,data:W1},{days:WEEK2_DAYS,data:W2}].forEach(({days:wd,data})=>{
    wd.forEach((d,di)=>{
      for(let hi=0;hi<HOURS.length;hi++){
        if(data[hi][di]&&data[hi][di].some(n=>n.toUpperCase()===wu)){days.push(d.date+' '+d.label);break;}
      }
    });
  });
  return days;
}

      </div>
    </div>
    <div class="worker-body">${formHTML}<ul class="task-list">${taskListHTML}</ul></div>
  </div>`;
}
function renderCard(w){renderWorkersGrid();}
async function doAddTask(w){
  const sel=document.getElementById('sel-'+w),inp=document.getElementById('inp-'+w);
  if(!inp||!sel)return;
  const text=inp.value.trim();
  if(!text||sel.value==='Nessun turno')return;
  inp.value='';
  await addTask(w,sel.value,text);
}
function renderWorkersGrid(){
  document.getElementById('workers-root').innerHTML=WORKERS.map(w=>renderWorkerCard(w)).join('');
}

function showTab(tab,btn){
  document.getElementById('tab-orario').style.display=tab==='orario'?'':'none';
  document.getElementById('tab-task').style.display=tab==='task'?'':'none';
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);updateClock();
</script>
</body>
